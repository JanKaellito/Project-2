<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kupal's Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="JobPortalStyle.css">
</head>
<body class="page-register">
    
<div class="app-container">
    <div class="login-section">
        <div class="login-card">
            <div class="login-brand">
                <div class="logo-icon">
                    <img src="LOGO_jobportal.jpg.png" alt="Logo" style="width:140px;height:140px;object-fit:contain;">
                </div>
                <h1>Create Account</h1>
                <span>Register as </span>
            </div>
            <div class="role-tabs" id="registerRoleTabs">
                <div class="role-tab active" data-role="student"><i class="fas fa-graduation-cap"></i> Student</div>
                <div class="role-tab" data-role="employee"><i class="fas fa-building"></i> Employer</div>
            </div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="registerName" placeholder="Full name">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="registerEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="registerPassword" placeholder="Password">
            </div>
            <button class="login-btn" id="registerBtn"><i class="fas fa-user-plus"></i> Create Account</button>
            <p class="register-text">Already have an account? <a href="JobPortalindex.html">Sign In</a></p>
        </div>
        
    </div>
</div>
<div id="toastMsg"></div>
<script src="api/apiClient.js"></script>
<script src="JobPortalscript.js"></script>
</body>
</html>
